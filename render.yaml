services:
  - type: web
    name: bharatvote
    runtime: node
    plan: free
    buildCommand: npm ci --prefix BharatVoteFrontend && npm run build --prefix BharatVoteFrontend && npm ci --prefix bharatvote-backend
    startCommand: npm start --prefix bharatvote-backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: OTP_MOCK
        value: "true"
      - key: FACE_MATCH_MOCK
        value: "true"
      - key: MAX_FILE_SIZE_MB
        value: "5"
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: HASH_SECRET_SALT
        generateValue: true
      - key: VOTE_ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
